<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DracinaVIP</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

header{
display:flex;
align-items:center;
padding:15px;
}

.logo{
font-weight:bold;
font-size:22px;
color:#ffd54a;
}

.search{
margin-left:auto;
font-size:22px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:#111;
border-radius:15px;
overflow:hidden;
position:relative;
cursor:pointer;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.badge{
position:absolute;
top:10px;
right:10px;
background:black;
border:1px solid gold;
padding:3px 6px;
border-radius:6px;
font-size:12px;
}

.title{
padding:8px;
font-size:14px;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.bottom div{
text-align:center;
font-size:12px;
cursor:pointer;
}

/* PLAYER */

.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
}

.video-container{
flex:1;
position:relative;
}

video{
width:100%;
height:100%;
}

.speed{
position:absolute;
top:10px;
right:10px;
background:black;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

.episodes{
background:#111;
padding:10px;
display:flex;
overflow-x:auto;
gap:10px;
}

.ep{
background:#222;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
white-space:nowrap;
}

.page{
padding:20px;
}

</style>

</head>

<body>

<header>

<div class="logo">DRACINAVIP</div>

<div class="search" onclick="openSearch()">🔍</div>

</header>

<div id="home" class="grid"></div>

<div id="page" class="page"></div>

<div class="bottom">

<div onclick="goHome()">🏠<br>Beranda</div>
<div onclick="openHistory()">⏱<br>Riwayat</div>
<div onclick="openProfile()">👤<br>Profil</div>

</div>


<div id="player" class="player">

<div class="video-container">

<div class="speed" onclick="toggleSpeed()">1x</div>

<video id="video" controls></video>

</div>

<div id="episodes" class="episodes"></div>

</div>


<script>

const API="https://dracin-providers.vercel.app/api/v1/shortime/stream"

let currentEpisodes=[]
let currentIndex=0
let speed=1

load()

async function load(){

let res=await fetch(API+"/random?page=1&limit=30")
let json=await res.json()

let grid=document.getElementById("home")

grid.innerHTML=""

json.data.forEach(d=>{

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${d.cover}">
<div class="badge">HD EP</div>
<div class="title">${d.title}</div>

`

card.onclick=()=>openDetail(d.id)

grid.appendChild(card)

})

}

async function openDetail(id){

let res=await fetch(API+"/contents/"+id)

let json=await res.json()

let d=json.data

currentEpisodes=d.episodeList

let epBox=document.getElementById("episodes")

epBox.innerHTML=""

d.episodeList.forEach((ep,i)=>{

let div=document.createElement("div")

div.className="ep"

div.innerText=ep.title

div.onclick=()=>play(ep.id,i)

epBox.appendChild(div)

})

play(d.episodeList[0].id,0)

}

async function play(id,index){

currentIndex=index

let res=await fetch(API+"/episodes/"+id+"/video-url?platform=android")

let json=await res.json()

let url=json.data.videoUrl

let video=document.getElementById("video")

document.getElementById("player").style.display="flex"

if(Hls.isSupported()){

let hls=new Hls()

hls.loadSource(url)

hls.attachMedia(video)

}else{

video.src=url

}

video.play()

saveHistory(currentEpisodes[index].title)

video.onended=nextEpisode

}

function nextEpisode(){

currentIndex++

if(currentEpisodes[currentIndex]){

play(currentEpisodes[currentIndex].id,currentIndex)

}

}

function toggleSpeed(){

let video=document.getElementById("video")

speed=speed===1?2:1

video.playbackRate=speed

document.querySelector(".speed").innerText=speed+"x"

}

/* SEARCH */

function openSearch(){

let q=prompt("Cari drama")

if(!q)return

search(q)

}

async function search(q){

let res=await fetch(API+"/random?page=1&limit=50")

let json=await res.json()

let results=json.data.filter(d=>d.title.toLowerCase().includes(q.toLowerCase()))

let page=document.getElementById("page")

page.innerHTML="<h2>Search Result</h2>"

results.forEach(r=>{

let div=document.createElement("div")

div.innerText=r.title

div.onclick=()=>openDetail(r.id)

page.appendChild(div)

})

}

/* HISTORY */

function saveHistory(title){

let h=JSON.parse(localStorage.getItem("history")||"[]")

h.unshift(title)

localStorage.setItem("history",JSON.stringify(h.slice(0,20)))

}

function openHistory(){

let h=JSON.parse(localStorage.getItem("history")||"[]")

let page=document.getElementById("page")

page.innerHTML="<h2>Riwayat Nonton</h2>"

h.forEach(i=>{

let div=document.createElement("div")

div.innerText=i

page.appendChild(div)

})

}

/* PROFILE */

function openProfile(){

let page=document.getElementById("page")

page.innerHTML=`

<h2>Profil</h2>

<p>Guest User</p>

<p>Total History: ${JSON.parse(localStorage.getItem("history")||"[]").length}</p>

`

}

function goHome(){

document.getElementById("page").innerHTML=""

load()

}

</script>

</body>
</html>
