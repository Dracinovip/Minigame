<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DracinaVIP</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

/* HEADER */

header{
display:flex;
align-items:center;
padding:15px;
}

.logo{
font-weight:bold;
font-size:22px;
color:#ffd54a;
}

.search{
margin-left:auto;
cursor:pointer;
font-size:22px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:#111;
border-radius:15px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.title{
padding:8px;
font-size:14px;
}

/* DETAIL */

.detail{
padding:20px;
}

.detail img{
width:120px;
border-radius:10px;
}

.play{
background:#6aff00;
padding:10px;
margin-top:20px;
border-radius:8px;
display:inline-block;
cursor:pointer;
color:black;
}

/* PLAYER */

.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
}

.video-container{
flex:1;
position:relative;
}

video{
width:100%;
height:100%;
}

.controls{
position:absolute;
top:10px;
left:10px;
display:flex;
gap:10px;
}

.btn{
background:rgba(0,0,0,.6);
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

/* EPISODES */

.episodes{
background:#111;
padding:10px;
display:flex;
overflow-x:auto;
gap:10px;
}

.ep{
background:#222;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

/* NAV */

.bottom{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.bottom div{
cursor:pointer;
text-align:center;
font-size:12px;
}

.page{
padding:20px;
}

</style>

</head>

<body>

<header>

<div class="logo">DRACINAVIP</div>

<div class="search" onclick="openSearch()">🔍</div>

</header>


<div id="home" class="grid"></div>

<div id="detail" class="detail"></div>

<div id="page" class="page"></div>


<div class="bottom">

<div onclick="goHome()">🏠<br>Beranda</div>
<div onclick="openHistory()">⏱<br>Riwayat</div>
<div onclick="openProfile()">👤<br>Profil</div>

</div>


<div id="player" class="player">

<div class="video-container">

<div class="controls">

<div class="btn" onclick="closePlayer()">⬅</div>
<div class="btn" onclick="toggleSpeed()">2x</div>

</div>

<video id="video" controls></video>

</div>

<div id="episodes" class="episodes"></div>

</div>


<script>

const API="https://dracin-providers.vercel.app/api/v1/shortime/stream"

let episodes=[]
let index=0
let speed=1

loadHome()

async function loadHome(){

let res=await fetch(API+"/random?page=1&limit=30")
let json=await res.json()

let grid=document.getElementById("home")

grid.innerHTML=""

json.data.forEach(d=>{

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${d.cover}">
<div class="title">${d.title}</div>

`

card.onclick=()=>openDetail(d.id)

grid.appendChild(card)

})

}

/* DETAIL PAGE */

async function openDetail(id){

let res=await fetch(API+"/contents/"+id)
let json=await res.json()

let d=json.data

episodes=d.episodeList

let box=document.getElementById("detail")

box.innerHTML=`

<h2>${d.title}</h2>

<img src="${d.cover}">

<p>${d.summary}</p>

<div class="play" onclick="start()">▶ Tonton Sekarang</div>

`

}

/* START PLAYER */

function start(){

play(episodes[0].id,0)

}

/* PLAYER */

async function play(id,i){

index=i

let res=await fetch(API+"/episodes/"+id+"/video-url?platform=android")
let json=await res.json()

let url=json.data.videoUrl

let video=document.getElementById("video")

document.getElementById("player").style.display="flex"

if(Hls.isSupported()){

let hls=new Hls()

hls.loadSource(url)

hls.attachMedia(video)

}else{

video.src=url

}

video.play()

saveHistory(episodes[i].title)

video.onended=nextEpisode

loadEpisodes()

}

function loadEpisodes(){

let box=document.getElementById("episodes")

box.innerHTML=""

episodes.forEach((ep,i)=>{

let div=document.createElement("div")

div.className="ep"

div.innerText=ep.title

div.onclick=()=>play(ep.id,i)

box.appendChild(div)

})

}

function nextEpisode(){

index++

if(episodes[index]){

play(episodes[index].id,index)

}

}

function closePlayer(){

document.getElementById("player").style.display="none"

}

/* SPEED */

function toggleSpeed(){

let video=document.getElementById("video")

speed=speed===1?2:1

video.playbackRate=speed

}

/* SEARCH */

function openSearch(){

let q=prompt("Cari drama")

if(!q)return

search(q)

}

async function search(q){

let res=await fetch(API+"/random?page=1&limit=50")
let json=await res.json()

let page=document.getElementById("page")

page.innerHTML="<h2>Search</h2>"

json.data.filter(d=>d.title.toLowerCase().includes(q.toLowerCase()))
.forEach(d=>{

let div=document.createElement("div")

div.innerText=d.title

div.onclick=()=>openDetail(d.id)

page.appendChild(div)

})

}

/* HISTORY */

function saveHistory(title){

let h=JSON.parse(localStorage.getItem("history")||"[]")

h.unshift(title)

localStorage.setItem("history",JSON.stringify(h.slice(0,20)))

}

function openHistory(){

let h=JSON.parse(localStorage.getItem("history")||"[]")

let page=document.getElementById("page")

page.innerHTML="<h2>Riwayat</h2>"

h.forEach(i=>{

let div=document.createElement("div")

div.innerText=i

page.appendChild(div)

})

}

/* PROFILE */

function openProfile(){

let page=document.getElementById("page")

page.innerHTML=`

<h2>Profil</h2>

<p>User: Guest</p>

<p>Total Riwayat: ${JSON.parse(localStorage.getItem("history")||"[]").length}</p>

`

}

function goHome(){

document.getElementById("page").innerHTML=""
document.getElementById("detail").innerHTML=""

loadHome()

}

</script>

</body>
</html>
