<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drama Stream</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:#141414;
padding:15px;
font-size:22px;
font-weight:bold;
}

nav{
display:flex;
gap:15px;
padding:10px;
overflow:auto;
background:#1a1a1a;
}

nav div{
cursor:pointer;
white-space:nowrap;
}

.section{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
}

.card{
background:#1c1c1c;
border-radius:8px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.title{
padding:8px;
font-size:14px;
}

.banner{
width:100%;
height:250px;
object-fit:cover;
cursor:pointer;
}

.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
z-index:999;
}

video{
width:100%;
height:80%;
}

.back{
padding:10px;
background:#111;
cursor:pointer;
}

.detail{
padding:20px;
}

.episodes{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px;
}

.ep{
background:#1c1c1c;
padding:10px;
cursor:pointer;
}

</style>
</head>

<body>

<header>DRAMA STREAM</header>

<nav id="nav"></nav>

<div id="home"></div>

<div id="detail"></div>

<div class="player" id="player">
<div class="back" onclick="closePlayer()">⬅ Back</div>
<video id="video" controls></video>
</div>

<script>

const API="https://dracin-providers.vercel.app/api/v1/shortime/stream";

loadHome();
loadNav();

async function loadNav(){

let res=await fetch(API+"/navigation");
let json=await res.json();

let nav=document.getElementById("nav");

json.data.forEach(c=>{
let d=document.createElement("div");
d.innerText=c.name;
nav.appendChild(d);
});

}

async function loadHome(){

let home=document.getElementById("home");
home.innerHTML="";

let banner=await fetch(API+"/banner?page=1&limit=5").then(r=>r.json());

banner.data.forEach(b=>{
let img=document.createElement("img");
img.src=b.landscapeImage;
img.className="banner";
img.onclick=()=>openDetail(b.contentsId);
home.appendChild(img);
});

createSection("Trending",API+"/theme?kind=trending");
createSection("New Release",API+"/home/new-release?page=1&limit=10");
createSection("Watching",API+"/home/watching?page=1&limit=10");
createSection("Recommended",API+"/home/recommend?page=1&limit=10");
createSection("Random",API+"/random?page=1&limit=10");

}

async function createSection(title,url){

let home=document.getElementById("home");

let section=document.createElement("div");
section.className="section";

section.innerHTML="<h2>"+title+"</h2><div class='grid'></div>";

home.appendChild(section);

let grid=section.querySelector(".grid");

let res=await fetch(url);
let json=await res.json();

let list=json.data;

list.forEach(item=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${item.cover}">
<div class="title">${item.title}</div>
`;

card.onclick=()=>openDetail(item.id);

grid.appendChild(card);

});

}

async function openDetail(id){

let res=await fetch(API+"/contents/"+id);
let json=await res.json();
let d=json.data;

let detail=document.getElementById("detail");
let home=document.getElementById("home");

home.style.display="none";

detail.innerHTML=`
<div class="detail">

<img src="${d.landscapeImage}" style="width:100%">

<h2>${d.title}</h2>

<p>${d.summary}</p>

<h3>Episodes</h3>

<div class="episodes"></div>

</div>
`;

let epContainer=detail.querySelector(".episodes");

d.episodeList.forEach(ep=>{

let div=document.createElement("div");
div.className="ep";
div.innerText=ep.title;

div.onclick=()=>playEpisode(ep.id);

epContainer.appendChild(div);

});

}

async function playEpisode(id){

let res=await fetch(API+"/episodes/"+id+"/video-url?platform=android");
let json=await res.json();

let url=json.data.videoUrl;

let video=document.getElementById("video");

document.getElementById("player").style.display="flex";

if(Hls.isSupported()){

let hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);

}else{

video.src=url;

}

}

function closePlayer(){

document.getElementById("player").style.display="none";

let video=document.getElementById("video");
video.pause();

}

</script>

</body>
</html>
