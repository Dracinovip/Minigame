<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Tap Tap Telegram</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* Desain ngikutin Tema Telegram otomatis */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: var(--tg-theme-bg-color, #1e1e1e);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .stats {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }

        #game-area {
            margin: 40px 0;
            height: 120px; /* Jaga ukuran biar gak lompat-lompat */
        }

        #target {
            width: 100px;
            height: 100px;
            background-color: #ff4757;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            user-select: none; /* Biar teks gak ke-block pas di-tap cepet */
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            transition: transform 0.05s;
            margin: 0 auto;
        }

        #target:active {
            transform: scale(0.9);
        }

        button.action-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Tap Tap Ngebut! 🚀</h1>
    <div class="stats">Skor: <span id="score">0</span></div>
    <div class="stats">Waktu: <span id="time">10</span>s</div>

    <div id="game-area">
        <div id="target" onclick="clickTarget()" style="pointer-events: none; opacity: 0.5;">TAP!</div>
    </div>

    <button id="start-btn" class="action-btn" onclick="startGame()">Mulai Game</button>

    <script>
        // Inisialisasi Telegram Web App Object
        let tg = window.Telegram.WebApp;
        tg.expand(); // Bikin tampilannya full screen nutupin layar chat

        let score = 0;
        let timeLeft = 10;
        let timerInterval;
        let isPlaying = false;

        const scoreDisplay = document.getElementById("score");
        const timeDisplay = document.getElementById("time");
        const startBtn = document.getElementById("start-btn");
        const targetBtn = document.getElementById("target");

        function startGame() {
            score = 0;
            timeLeft = 10;
            isPlaying = true;
            
            scoreDisplay.innerText = score;
            timeDisplay.innerText = timeLeft;
            
            startBtn.style.display = "none"; // Sembunyiin tombol mulai
            targetBtn.style.pointerEvents = "auto"; // Aktifin tombol TAP
            targetBtn.style.opacity = "1";

            // Hitung mundur timer
            timerInterval = setInterval(() => {
                timeLeft--;
                timeDisplay.innerText = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function clickTarget() {
            if (!isPlaying) return;
            score++;
            scoreDisplay.innerText = score;
            
            // Bikin tombolnya gerak-gerak dikit biar agak nantang
            const randomX = Math.floor(Math.random() * 40) - 20;
            const randomY = Math.floor(Math.random() * 40) - 20;
            targetBtn.style.transform = `translate(${randomX}px, ${randomY}px) scale(0.9)`;
            
            setTimeout(() => {
                targetBtn.style.transform = `translate(${randomX}px, ${randomY}px) scale(1)`;
            }, 50);

            // Fitur khusus Telegram: Kasih getaran ke HP pas tombol ditekan
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            isPlaying = false;
            
            startBtn.style.display = "inline-block";
            startBtn.innerText = "Main Lagi";
            targetBtn.style.pointerEvents = "none";
            targetBtn.style.opacity = "0.5";
            targetBtn.style.transform = `translate(0px, 0px)`;
            
            // Pop-up alert khas Telegram
            tg.showAlert(`Waktu Habis! Skor lu: ${score} 🔥`);
        }
    </script>
</body>
</html>
